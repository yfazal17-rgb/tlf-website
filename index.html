<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheLifeFolder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: oklch(17% 0.048 148);
    --parchment-dark: oklch(21% 0.052 148);
    --ink: oklch(96% 0.012 148);
    --ink-mid: oklch(72% 0.025 148);
    --ink-light: oklch(48% 0.035 148);
    --gold: oklch(64% 0.20 145);
    --gold-dark: oklch(52% 0.18 145);
    --leaf: oklch(75% 0.22 142);
    --border: oklch(26% 0.055 148);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
    --cond: 'Barlow Condensed', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: var(--serif);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::selection { background: var(--gold); color: var(--parchment); }

  .ticker-wrap {
    background: var(--gold);
    color: var(--parchment);
    overflow: hidden;
    height: 32px;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: flex;
    gap: 0;
    animation: ticker 28s linear infinite;
    white-space: nowrap;
  }
  .ticker-track span {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 0 40px;
    opacity: 0.85;
  }
  .ticker-track span.dot { color: var(--parchment); padding: 0; opacity: 0.5; }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .nav-logo img { width: 28px; height: 28px; image-rendering: pixelated; }
  .nav-wordmark {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .nav-links a:hover { opacity: 1; }

  .hero {
    padding: 80px 32px 60px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 40px;
    align-items: end;
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 24px;
  }
  .hero-title {
    font-family: var(--cond);
    font-size: clamp(72px, 11vw, 160px);
    font-weight: 600;
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 32px;
  }
  .hero-title em { font-style: italic; color: var(--gold); font-weight: 300; }
  .hero-sub {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-mid);
    line-height: 1.6;
    max-width: 520px;
  }
  .hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 20px; }
  .hero-logo-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-logo-wrap img {
    width: 160px;
    height: 160px;
    image-rendering: pixelated;
    filter: drop-shadow(4px 6px 0px var(--gold));
  }
  .hero-index {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }
  .hero-index strong {
    color: var(--ink);
    display: block;
    font-size: 22px;
    font-family: var(--cond);
    font-weight: 600;
    letter-spacing: 0;
    line-height: 1;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-light);
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .archive-section { padding: 0 32px 80px; }
  .filter-bar {
    display: flex;
    gap: 0;
    margin: 28px 0 36px;
    border: 1px solid var(--border);
    width: fit-content;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: none;
    border-right: 1px solid var(--border);
    background: transparent;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { background: var(--parchment-dark); color: var(--ink); }
  .filter-btn.active { background: var(--gold); color: var(--parchment); }

  .archive-grid { columns: 4; column-gap: 1px; gap: 1px; }
  .archive-item {
    break-inside: avoid;
    margin-bottom: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: var(--parchment-dark);
  }
  .archive-item img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
  }
  .archive-item:hover img { transform: scale(1.03); }
  .archive-item:hover .item-overlay { opacity: 1; }
  .item-overlay {
    position: absolute;
    inset: 0;
    background: oklch(10% 0.04 148 / 0.85);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }
  .item-overlay-title {
    font-family: var(--cond);
    font-size: 18px;
    font-weight: 600;
    color: var(--parchment);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.1;
  }
  .item-overlay-tag {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(8,18,12,0.88);
    z-index: 200;
    display: flex;
    align-items: stretch;
    justify-content: flex-end;
  }
  .modal-drawer {
    width: min(640px, 90vw);
    background: var(--parchment);
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .modal-header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--parchment);
    z-index: 1;
  }
  .modal-close {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-mid);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--gold); color: var(--parchment); border-color: var(--gold); }
  .modal-body { padding: 40px 32px; flex: 1; }
  .modal-img { width: 100%; display: block; margin-bottom: 32px; }
  .modal-title {
    font-family: var(--cond);
    font-size: 42px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .modal-tag {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .modal-divider { height: 1px; background: var(--border); margin: 24px 0; }
  .modal-desc {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 300;
    line-height: 1.75;
    color: var(--ink-mid);
  }
  .modal-meta { margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .modal-meta-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 4px;
  }
  .modal-meta-val { font-family: var(--cond); font-size: 16px; font-weight: 500; color: var(--ink); }
  .modal-ig-btn {
    display: inline-block;
    margin-top: 32px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--gold);
    padding: 10px 24px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .modal-ig-btn:hover { background: var(--gold-dark); }

  .manifesto-section { border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; }
  .manifesto-left { padding: 80px 32px; border-right: 1px solid var(--border); }
  .manifesto-right { padding: 80px 32px; background: var(--gold); color: var(--parchment); }
  .manifesto-heading {
    font-family: var(--cond);
    font-size: 72px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.9;
    margin-bottom: 40px;
  }
  .manifesto-text { font-family: var(--serif); font-size: 17px; font-weight: 300; line-height: 1.85; color: var(--ink-mid); }
  .manifesto-right .manifesto-text { color: oklch(20% 0.04 148); }
  .manifesto-right .manifesto-heading { color: oklch(14% 0.04 148); }
  .manifesto-pull {
    font-family: var(--cond);
    font-size: 32px;
    font-weight: 500;
    font-style: italic;
    line-height: 1.2;
    color: var(--leaf);
    margin: 40px 0 0;
  }

  .about-section {
    border-top: 1px solid var(--border);
    padding: 80px 32px;
    display: grid;
    grid-template-columns: 200px 1fr 1fr;
    gap: 60px;
    align-items: start;
  }
  .about-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-light); padding-top: 6px; }
  .about-heading { font-family: var(--cond); font-size: 52px; font-weight: 600; text-transform: uppercase; letter-spacing: -0.01em; line-height: 0.95; margin-bottom: 28px; }
  .about-body { font-family: var(--serif); font-size: 17px; font-weight: 300; line-height: 1.8; color: var(--ink-mid); }

  .writings-section { border-top: 1px solid var(--border); }
  .writing-item {
    display: grid;
    grid-template-columns: 80px 1fr 160px;
    align-items: center;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    gap: 32px;
    text-decoration: none;
    color: inherit;
  }
  .writing-item:hover { background: var(--parchment-dark); }
  .writing-num { font-family: var(--mono); font-size: 11px; color: var(--ink-light); letter-spacing: 0.1em; }
  .writing-title { font-family: var(--cond); font-size: 22px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
  .writing-title span { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 16px; display: block; color: var(--ink-mid); text-transform: none; margin-top: 2px; letter-spacing: 0; }
  .writing-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); text-align: right; }

  footer {
    border-top: 1px solid var(--border);
    background: oklch(12% 0.042 148);
    color: var(--ink);
    padding: 60px 32px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 40px;
    align-items: end;
  }
  .footer-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .footer-brand img { width: 36px; height: 36px; image-rendering: pixelated; opacity: 0.9; }
  .footer-brand-name { font-family: var(--cond); font-size: 24px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .footer-tagline { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--ink-mid); line-height: 1.6; }
  .footer-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .footer-links a { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); text-decoration: none; transition: color 0.15s; }
  .footer-links a:hover { color: var(--gold); }
  .footer-copy { font-family: var(--mono); font-size: 9px; color: var(--ink-light); text-align: right; letter-spacing: 0.1em; line-height: 1.8; }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; }
    .hero-right { align-items: flex-start; }
    .archive-grid { columns: 2; }
    .manifesto-section { grid-template-columns: 1fr; }
    .about-section { grid-template-columns: 1fr; }
    footer { grid-template-columns: 1fr; }
    .writing-item { grid-template-columns: 60px 1fr; }
    .writing-tag { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const ARCHIVE_ITEMS = [
  {
    id: 1,
    title: "Raining So Hard It Hurts",
    tag: "Pop Culture",
    cat: "popculture",
    desc: "Comic panel. Rain and red capes. The kind of image that hits before you know why.",
    era: "2024",

  },
  {

    iglink: "https://www.instagram.com/p/DXmZD74EvjT/"
  },
  {
    id: 3,

  },
  {
    id: 4,

    desc: "Rain-soaked. Beaten. Not done. The image says everything the caption doesn't need to.",
    era: "2024",
    medium: "Reference",
    image: "images/captain-america.jpg",
    iglink: ""
  },
  {
    id: 5,
    title: "Only Star Left",
    tag: "Pop Culture",
    cat: "popculture",
    desc: "A figure alone in the dark on a single spotlight. Everything else is void.",
    era: "2024",
    medium: "Reference",
    image: "images/figure-darkness.jpg",
    iglink: ""
  },
  {
    id: 6,
    title: "Potato Salad",
    tag: "Pop Culture",
    cat: "popculture",
    desc: "ASAP Rocky and Tyler the Creator. Paris. A rainbow. Maximum style, zero effort.",
    era: "2024",
    medium: "Reference",
    image: "images/potato-salad.jpg",
    iglink: "https://www.instagram.com/p/DXmZD74EvjT/"
  },
  {
    id: 7,
    title: "To Charles",
    tag: "Archive",
    cat: "vintage",
    desc: "Schumacher's handwritten note on Leclerc's helmet. Whatever you do, be happy and smile.",
    era: "2024",
    medium: "Reference",
    image: "images/schumacher-helmet.jpg",
    iglink: ""
  },
  {
    id: 8,
    title: "Red Sky",
    tag: "Pop Culture",
    cat: "popculture",
    desc: "Blonde. Masked. Gun to the head. Crimson background. Total composure.",
    era: "2024",
    medium: "Reference",
    image: "images/comic-gun.jpg",
    iglink: ""
  },
];

const WRITINGS = [
  { id:1, num:"001", title:"Be Delusional, So You Can Be Great", sub:"On manufacturing belief before you have proof", tag:"Essay", date:"Dec 2025", link:"https://thelifefolder.substack.com" },
  { id:2, num:"002", title:"This Is The Life Folder", sub:"What it is, what it's becoming, why it matters", tag:"Essay", date:"Dec 19, 2025", link:"https://thelifefolder.substack.com" },
];

const CATS = ["all","vintage","moodboard","writing","popculture"];
const CAT_LABELS = { all:"All", vintage:"Vintage", moodboard:"Mood Boards", writing:"Writing", popculture:"Pop Culture" };

const logoSrc = 'uploads/images_upload-1777114486858.png';

function ArchiveCard({ item, onClick }) {
  return (
    <div className="archive-item" onClick={() => onClick(item)}>
      <img src={item.image} alt={item.title} loading="lazy" />
      <div className="item-overlay">
        <div className="item-overlay-title">{item.title}</div>
        <div className="item-overlay-tag">{item.tag} · {item.era}</div>
      </div>
    </div>
  );
}

function Modal({ item, onClose }) {
  if (!item) return null;
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-drawer" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <span style={{fontFamily:'var(--mono)',fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--ink-light)'}}>
            {item.tag} · TLF Archive
          </span>
          <button className="modal-close" onClick={onClose}>Close ✕</button>
        </div>
        <div className="modal-body">
          <img className="modal-img" src={item.image} alt={item.title} />
          <div className="modal-tag">{item.tag}</div>
          <div className="modal-title">{item.title}</div>
          <div className="modal-divider"></div>
          <div className="modal-desc">{item.desc}</div>
          <div className="modal-meta">
            <div>
              <div className="modal-meta-label">Era</div>
              <div className="modal-meta-val">{item.era}</div>
            </div>
            <div>
              <div className="modal-meta-label">Medium</div>
              <div className="modal-meta-val">{item.medium}</div>
            </div>
            <div>
              <div className="modal-meta-label">Category</div>
              <div className="modal-meta-val" style={{textTransform:'capitalize'}}>{CAT_LABELS[item.cat]}</div>
            </div>
            <div>
              <div className="modal-meta-label">Filed by</div>
              <div className="modal-meta-val">TLF</div>
            </div>
          </div>
          {item.iglink && (
            <a className="modal-ig-btn" href={item.iglink} target="_blank" rel="noopener noreferrer">
              View on Instagram ↗
            </a>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [cat, setCat] = React.useState('all');
  const [modal, setModal] = React.useState(null);

  const filtered = cat === 'all' ? ARCHIVE_ITEMS : ARCHIVE_ITEMS.filter(i => i.cat === cat);

  const TICKER_ITEMS = ['TheLifeFolder','✦','Archive','✦','Est. 2024','✦','Everything That Matters, Filed','✦','Vintage','✦','Culture','✦','Craft','✦'];
  const tickerContent = [...TICKER_ITEMS,...TICKER_ITEMS].map((t,i) =>
    t === '✦' ? <span className="dot" key={i}>✦</span> : <span key={i}>{t}</span>
  );

  return (
    <>
      <div className="ticker-wrap">
        <div className="ticker-track">{tickerContent}</div>
      </div>

      <nav>
        <div className="nav-logo" onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
          <img src={logoSrc} alt="TLF" />
          <span className="nav-wordmark">TheLifeFolder</span>
        </div>
        <ul className="nav-links">
          <li><a href="#archive">Archive</a></li>
          <li><a href="#manifesto">Manifesto</a></li>
          <li><a href="#writings">Writing</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </nav>

      <section className="hero" id="top">
        <div className="hero-left">
          <div className="hero-eyebrow">Est. 2024 · Personal Archive · Becoming a Brand</div>
          <h1 className="hero-title">
            The<br/><em>Life</em><br/>Folder
          </h1>
          <p className="hero-sub">everything that matters, filed.</p>
        </div>
        <div className="hero-right">
          <div className="hero-logo-wrap">
            <img src={logoSrc} alt="TheLifeFolder" />
          </div>
          <div className="hero-index">
            <strong>{ARCHIVE_ITEMS.length}</strong>
            items filed
            <br/><br/>
            <strong>{WRITINGS.length}</strong>
            texts written
          </div>
        </div>
      </section>

      <div id="archive">
        <div className="section-label">§ Archive · Browse the Folder</div>
        <section className="archive-section">
          <div className="filter-bar">
            {CATS.map(c => (
              <button key={c} className={`filter-btn${cat===c?' active':''}`} onClick={() => setCat(c)}>
                {CAT_LABELS[c]}
              </button>
            ))}
          </div>
          <div className="archive-grid">
            {filtered.map(item => (
              <ArchiveCard key={item.id} item={item} onClick={setModal} />
            ))}
          </div>
        </section>
      </div>

      <div id="manifesto">
        <div className="section-label">§ Manifesto · The Why</div>
        <section className="manifesto-section">
          <div className="manifesto-left">
            <div className="manifesto-heading">What<br/>This<br/>Is</div>
            <div className="manifesto-text">
              A folder is just a container. But the life folder is different —
              it's the place where you put things that matter before you
              know why they matter. The vintage find that shaped your eye.
              The campaign image that changed how you understood beauty.
              The essay that made you want to make things.
              <br/><br/>
              This is that folder. Not a shop. Not a brand yet.
              Something more honest than that — a record of becoming.
            </div>
            <div className="manifesto-pull">"Archive first.<br/>Brand later.<br/>Always."</div>
          </div>
          <div className="manifesto-right">
            <div className="manifesto-heading" style={{color:'oklch(14% 0.04 148)'}}>The<br/>Rules</div>
            <div className="manifesto-text">
              I. Save what moves you, not what performs.<br/><br/>
              II. The reference is not the thing — it's the conversation between things.<br/><br/>
              III. Vintage is not nostalgia. It is evidence.<br/><br/>
              IV. A brand is just a point of view, repeated with conviction.<br/><br/>
              V. The folder stays open. The archive is never finished.
            </div>
          </div>
        </section>
      </div>

      <div id="writings">
        <div className="section-label">§ Writing · Filed Texts</div>
        <section className="writings-section">
          {WRITINGS.map(w => (
            <a key={w.id} className="writing-item" href={w.link} target="_blank" rel="noopener noreferrer">
              <div className="writing-num">{w.num}</div>
              <div className="writing-title">
                {w.title}
                <span>{w.sub}</span>
              </div>
              <div className="writing-tag">{w.tag}<br/>{w.date}</div>
            </a>
          ))}
        </section>
      </div>

      <div id="about">
        <section className="about-section">
          <div className="about-label">About<br/>TLF</div>
          <div>
            <div className="about-heading">A Folder<br/>With a<br/>Future</div>
          </div>
          <div>
            <div className="about-body">
              TheLifeFolder started as exactly that — a folder.
              A personal archive of references, vintage finds, pop culture
              moments, and writings that felt too important to lose and
              too personal to share anywhere else.
              <br/><br/>
              It is becoming a fashion brand. Not because fashion needs
              another brand, but because this archive has a point of view
              that deserves garments. The reference comes first.
              The collection follows.
              <br/><br/>
              Currently: building. Eventually: dropping.
            </div>
          </div>
        </section>
      </div>

      <footer>
        <div>
          <div className="footer-brand">
            <img src={logoSrc} alt="TLF" />
            <span className="footer-brand-name">TLF</span>
          </div>
          <div className="footer-tagline">everything that matters, filed.</div>
        </div>
        <ul className="footer-links">
          <li><a href="#archive">Archive</a></li>
          <li><a href="#manifesto">Manifesto</a></li>
          <li><a href="#writings">Writing</a></li>
          <li><a href="#about">About</a></li>
        </ul>
        <div className="footer-copy">
          © 2025 TheLifeFolder<br/>
          All rights filed.<br/>
          Est. 2024
        </div>
      </footer>

      <Modal item={modal} onClose={() => setModal(null)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
